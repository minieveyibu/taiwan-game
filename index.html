<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣知識配對遊戲 🗺️</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sea:#aed6f1;--land:#a9dfbf;--land-hover:#58d68d;--land-active:#f39c12;
  --land-matched:#27ae60;--land-wrong:#e74c3c;
  --bg:#fffdf7;--panel:#fff;--border:#e0d5c5;
  --text:#2c1a0e;--text2:#7a5c3e;--accent:#c0392b;--accent2:#e67e22;
  --green:#1e8449;--red:#c0392b;--radius:12px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* HEADER */
.hdr{background:linear-gradient(135deg,#c0392b,#e67e22);color:#fff;padding:12px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 3px 16px rgba(192,57,43,.3);flex-wrap:wrap;gap:8px}
.hdr h1{font-size:19px;font-weight:900;letter-spacing:.02em}
.hdr p{font-size:11px;opacity:.85;margin-top:1px}
.hdr-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.badge{background:rgba(255,255,255,.22);border-radius:20px;padding:3px 11px;font-size:12px;font-weight:600}
.hdr-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:background .15s}
.hdr-btn:hover{background:rgba(255,255,255,.3)}

/* LAYOUT */
.layout{display:grid;grid-template-columns:350px 1fr;min-height:calc(100vh - 52px)}

/* LEFT PANEL */
.left{background:var(--panel);border-right:1.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden}

/* MAP */
.map-wrap{background:var(--sea);flex-shrink:0;position:relative;overflow:hidden;height:420px;cursor:grab;user-select:none}
.map-wrap:active{cursor:grabbing}
.map-wrap svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible}
.map-zoom-bar{position:absolute;bottom:8px;right:8px;display:flex;flex-direction:column;gap:3px;z-index:10}
.map-zoom-bar button{width:28px;height:28px;border:none;border-radius:6px;background:rgba(255,255,255,.85);color:#333;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.18);font-family:monospace;line-height:1}
.map-zoom-bar button:hover{background:#fff}
.map-hint{position:absolute;bottom:8px;left:8px;font-size:10px;color:rgba(0,0,0,.45);pointer-events:none}
.region{fill:var(--land);stroke:#fff;stroke-width:2;cursor:pointer;transition:fill .18s}
.region:hover:not(.matched):not(.inactive){fill:var(--land-hover)}
.region.active{fill:var(--land-active)}
.region.matched{fill:var(--land-matched);cursor:default}
.region.wrong{fill:var(--land-wrong);animation:flashW .5s}
.region.inactive{opacity:.6;cursor:default}
@keyframes flashW{0%,100%{fill:var(--land-wrong)}50%{fill:#fadbd8}}
.map-label{font-size:16px;fill:#1a5c2a;font-family:'Noto Sans TC',sans-serif;pointer-events:none;font-weight:700}
.map-label.matched{fill:#fff}
.map-label.inactive{fill:#888}

/* INFO */
.info{padding:12px;flex:1;overflow-y:auto}
.scores{display:flex;gap:7px;margin-bottom:10px}
.score-box{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:7px;text-align:center}
.score-box .n{font-size:22px;font-weight:700;line-height:1}
.score-box .l{font-size:10px;color:var(--text2);margin-top:2px}
.score-box.g .n{color:var(--green)}
.score-box.r .n{color:var(--red)}
.prog-wrap{height:7px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:10px}
.prog-fill{height:100%;background:linear-gradient(90deg,#e67e22,#c0392b);border-radius:99px;transition:width .4s}
.cur-box{border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;text-align:center;min-height:72px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.cur-box.has{border-color:var(--accent2)}
.cur-img{width:100%;height:120px;object-fit:cover;display:block;background:#e0e0e0}
.cur-fallback{width:100%;height:120px;display:none;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,#f5e6d3,#ffe0b2)}
.cur-name{font-size:15px;font-weight:700;padding:7px 10px 3px}
.cur-hint{font-size:11px;color:var(--text2);padding:0 10px 8px}
.cur-empty{font-size:12px;color:var(--text2);padding:14px}
.inst{background:#e8f4fd;border:1px solid #aed6f1;border-radius:10px;padding:9px 13px;font-size:12px;color:#1a5276;line-height:1.7}

/* RIGHT */
.right{padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:0}
.right-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:7px}
.right-hdr h2{font-size:16px;font-weight:700}


/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:9px}
.card{background:var(--panel);border:2.5px solid var(--border);border-radius:var(--radius);cursor:pointer;overflow:hidden;transition:transform .15s,border-color .15s,box-shadow .15s;position:relative}
.card:hover:not(.matched){transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.1);border-color:var(--accent2)}
.card.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(192,57,43,.18)}
.card.matched{border-color:var(--green);opacity:.7;cursor:default}
.card.wrong{border-color:var(--red);animation:shakeC .35s}
@keyframes shakeC{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.card img{width:100%;height:96px;object-fit:cover;display:block;background:#e8e8e8}
.card .img-fallback{width:100%;height:96px;display:none;align-items:center;justify-content:center;font-size:28px;background:linear-gradient(135deg,#f5e6d3,#ffe0b2);flex-direction:column;gap:4px}
.card .img-fallback span{font-size:10px;color:#7a5c3e;font-weight:600}
.card-name{padding:7px 9px;font-size:12px;font-weight:600;line-height:1.35}
.card-region{font-size:10px;color:var(--text2);padding:0 9px 6px}
.sel-badge,.match-tag{position:absolute;top:5px;font-size:10px;font-weight:700;border-radius:99px;padding:2px 8px}
.sel-badge{left:5px;background:var(--accent);color:#fff}
.match-tag{right:5px;background:var(--green);color:#fff}

/* QUESTION MANAGER */
.qmgr{margin-top:14px;border-top:1.5px solid var(--border);padding-top:14px}
.qmgr-tabs{display:flex;gap:0;margin-bottom:10px;border:1.5px solid var(--border);border-radius:9px;overflow:hidden}
.qmgr-tab{flex:1;padding:7px 6px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:var(--bg);color:var(--text2);font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.qmgr-tab.on{background:var(--accent);color:#fff}
.qmgr-search{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:'Noto Sans TC',sans-serif;color:var(--text);background:var(--bg);outline:none;margin-bottom:8px}
.qmgr-search:focus{border-color:var(--accent2)}
.q-list{display:flex;flex-direction:column;gap:5px;max-height:260px;overflow-y:auto}
.q-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:12px}
.q-item img{width:44px;height:34px;object-fit:cover;border-radius:5px;flex-shrink:0;background:#e0e0e0}
.q-item .qi-info{flex:1;min-width:0}
.q-item .qi-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-item .qi-place{color:var(--text2);font-size:10px;margin-top:1px}
.q-item .qi-btns{display:flex;gap:4px;flex-shrink:0}
.qi-btn{background:none;border:1px solid var(--border);border-radius:6px;font-size:11px;cursor:pointer;padding:3px 8px;color:var(--text2);font-family:'Noto Sans TC',sans-serif;transition:all .15s;white-space:nowrap}
.qi-btn.edit:hover{border-color:var(--accent2);color:var(--accent2);background:#fff8ee}
.qi-btn.del:hover{border-color:var(--red);color:var(--red);background:#fff0f0}
.q-empty{color:var(--text2);font-size:12px;text-align:center;padding:18px 0}
/* ADD NEW */
.add-toggle{width:100%;margin-top:8px;padding:8px;border:1.5px dashed var(--border);border-radius:9px;background:none;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.add-toggle:hover{border-color:var(--accent2);color:var(--accent2)}
.add-form-wrap{display:none;margin-top:8px}
.add-form-wrap.open{display:block}
.add-form{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.add-form input,.add-form select{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:'Noto Sans TC',sans-serif;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
.add-form input:focus,.add-form select:focus{border-color:var(--accent2)}
.add-form input[type=file]{display:none}
.img-upload-label{display:flex;align-items:center;justify-content:center;gap:5px;padding:7px 10px;border:1.5px dashed var(--border);border-radius:8px;font-size:11px;color:var(--text2);cursor:pointer;background:var(--bg);transition:border-color .15s;text-align:center}
.img-upload-label:hover{border-color:var(--accent2);color:var(--accent2)}
.img-preview{width:100%;height:72px;object-fit:cover;border-radius:7px;display:none;border:1px solid var(--border);margin-top:4px}
.add-full{grid-column:1/-1}
.btn-add{width:100%;padding:8px;border:none;border-radius:8px;background:var(--accent2);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:background .15s}
.btn-add:hover{background:#d68910}
/* EDIT MODAL */
.edit-overlay{position:fixed;inset:0;background:rgba(44,26,14,.6);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.edit-overlay.open{display:flex}
.edit-modal{background:var(--panel);border-radius:18px;padding:24px 26px;width:min(440px,94vw);box-shadow:0 8px 40px rgba(0,0,0,.22)}
.edit-modal h3{font-size:16px;font-weight:800;margin-bottom:14px}
.edit-modal label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:3px;margin-top:10px}
.edit-modal input,.edit-modal select{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans TC',sans-serif;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
.edit-modal input:focus,.edit-modal select:focus{border-color:var(--accent2)}
.edit-modal input[type=file]{display:none}
.edit-img-row{display:flex;gap:10px;align-items:flex-start;margin-top:4px}
.edit-img-thumb{width:80px;height:62px;object-fit:cover;border-radius:8px;border:1px solid var(--border);flex-shrink:0;background:#e8e8e8}
.edit-img-controls{flex:1;display:flex;flex-direction:column;gap:5px}
.edit-img-label{display:flex;align-items:center;justify-content:center;padding:6px 10px;border:1.5px dashed var(--border);border-radius:7px;font-size:11px;color:var(--text2);cursor:pointer;transition:all .15s;text-align:center}
.edit-img-label:hover{border-color:var(--accent2);color:var(--accent2)}
.edit-modal-btns{display:flex;gap:8px;margin-top:16px}
.edit-save{flex:2;padding:9px;border:none;border-radius:9px;background:var(--accent);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.edit-save:hover{background:#a93226}
.edit-cancel{flex:1;padding:9px;border:1.5px solid var(--border);border-radius:9px;background:none;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;color:var(--text2)}
.edit-cancel:hover{background:var(--bg)}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(44,26,14,.55);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:var(--panel);border-radius:20px;padding:28px 32px;max-width:370px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal h2{font-size:21px;font-weight:900;margin-bottom:6px;text-align:center}
.modal p{color:var(--text2);font-size:13px;text-align:center;margin-bottom:18px}
.modal-icon{font-size:46px;text-align:center;margin-bottom:8px}
.lv-btns{display:flex;flex-direction:column;gap:7px}
.lv-btn{padding:13px 18px;border-radius:11px;border:2px solid var(--border);background:var(--bg);cursor:pointer;font-size:14px;font-weight:700;font-family:'Noto Sans TC',sans-serif;color:var(--text);display:flex;align-items:center;justify-content:space-between;transition:all .15s}
.lv-btn:hover{border-color:var(--accent);background:#fff4ee;color:var(--accent)}
.lv-btn .sub{font-size:11px;font-weight:400;color:var(--text2)}
.res-stars{font-size:40px;text-align:center;margin-bottom:8px}
.res-msg{font-size:20px;font-weight:900;text-align:center;margin-bottom:5px}
.res-sub{color:var(--text2);font-size:13px;text-align:center;margin-bottom:18px}
.res-btns{display:flex;gap:8px;justify-content:center}
.btn{padding:9px 20px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#a93226}
.btn-s{background:var(--bg);color:var(--text);border:1.5px solid var(--border)}.btn-s:hover{background:var(--border)}

/* TOAST */
.toast{position:fixed;top:66px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:8px 18px;border-radius:99px;font-size:13px;font-weight:600;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap}
.toast.show{opacity:1}
.toast.ok{background:#1e8449}
.toast.ng{background:#c0392b}

@media(max-width:720px){
  .layout{grid-template-columns:1fr}
  .left{border-right:none;border-bottom:1.5px solid var(--border)}
  .map-wrap{height:320px}
}
</style>
</head>
<body>
<header class="hdr">
  <div style="font-size:28px;line-height:1">🗺️</div>
  <div><h1>台灣知識配對遊戲</h1><p>選景點/美食，再點地圖上的縣市！</p></div>
  <div class="hdr-right" style="display:flex;align-items:center;gap:8px">
    <label style="font-size:12px;opacity:.9;white-space:nowrap">出題數量</label>
    <input type="number" id="countInput" min="1" max="22" value="6"
      style="width:52px;padding:4px 6px;border-radius:8px;border:none;font-size:14px;font-weight:700;text-align:center;font-family:inherit;outline:none">
    <button class="hdr-btn" onclick="startCustomCount()">開始遊戲 ▶</button>
    <button class="hdr-btn" id="adminBtn" onclick="toggleAdmin()" title="管理員模式" style="padding:4px 10px">🔒</button>
  </div>
</header>

<div class="layout">
  <div class="left">
    <div class="map-wrap" id="mapWrap">
      <svg id="twSvg" viewBox="0 0 1000 1295" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="map-zoom-bar">
        <button onclick="zoomMap(1.3)" title="放大">＋</button>
        <button onclick="zoomMap(0.77)" title="縮小">－</button>
        <button onclick="resetView()" title="重置" style="font-size:12px">⌂</button>
      </div>
      <div class="map-hint">滾輪縮放・拖曳移動</div>
    </div>
    <div class="info">
      <div class="scores">
        <div class="score-box g"><div class="n" id="sM">0</div><div class="l">配對成功</div></div>
        <div class="score-box"><div class="n" id="sT">0</div><div class="l">共幾題</div></div>
        <div class="score-box r"><div class="n" id="sW">0</div><div class="l">答錯次數</div></div>
      </div>
      <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
      <div class="cur-box" id="curBox"><div class="cur-empty">👉 請先選擇右側的景點或美食</div></div>
      <div class="inst">① 點右側卡片選擇景點或美食<br>② 再點地圖上的縣市配對<br>③ 可捲動・縮放地圖方便點選 🗺️</div>
    </div>
  </div>

  <div class="right">
    <div class="right-hdr">
      <h2 id="rtitle">共 0 題</h2>
    </div>
    <div class="grid" id="cardGrid"></div>

    <!-- QUESTION MANAGER -->
    <div class="qmgr" id="qmgrSection" style="display:none">
      <div class="qmgr-tabs">
        <button class="qmgr-tab on" id="tab-builtin" onclick="switchTab('builtin')">📚 預設題目</button>
        <button class="qmgr-tab" id="tab-custom" onclick="switchTab('custom')">✏️ 自訂題目</button>
      </div>
      <input class="qmgr-search" type="text" id="qSearch" placeholder="🔍 搜尋題目名稱…" oninput="renderQList()">
      <div class="q-list" id="qList"></div>
      <button class="add-toggle" onclick="toggleAddForm()" id="addToggleBtn">➕ 新增自訂題目</button>
      <div class="add-form-wrap" id="addFormWrap">
        <div class="add-form">
          <input type="text" id="addItem" placeholder="景點或美食名稱" maxlength="16">
          <select id="addPlace">
          <option value="">選擇縣市</option>
          <option value="taipei-city">台北市</option>
          <option value="new-taipei-city">新北市</option>
          <option value="keelung-city">基隆市</option>
          <option value="taoyuan-city">桃園市</option>
          <option value="hsinchu-city">新竹市</option>
          <option value="hsinchu-county">新竹縣</option>
          <option value="miaoli-county">苗栗縣</option>
          <option value="taichung-city">台中市</option>
          <option value="changhua-county">彰化縣</option>
          <option value="nantou-county">南投縣</option>
          <option value="yunlin-county">雲林縣</option>
          <option value="chiayi-city">嘉義市</option>
          <option value="chiayi-county">嘉義縣</option>
          <option value="tainan-city">台南市</option>
          <option value="kaohsiung-city">高雄市</option>
          <option value="pingtung-county">屏東縣</option>
          <option value="yilan-county">宜蘭縣</option>
          <option value="hualien-county">花蓮縣</option>
          <option value="taitung-county">台東縣</option>
          <option value="kinmen-county">金門縣</option>
          <option value="penghu-county">澎湖縣</option>
          <option value="lienchiang-county">連江縣(馬祖)</option>
          </select>
          <div class="add-full">
            <label class="img-upload-label" for="addImgFile" id="imgUploadLabel">📷 上傳圖片</label>
            <input type="file" id="addImgFile" accept="image/*" onchange="handleImgFile(this)">
            <input type="text" id="addImgUrl" placeholder="或貼入圖片網址 https://..." style="margin-top:5px" oninput="handleImgUrl(this)">
            <img id="imgPreview" class="img-preview" alt="預覽">
          </div>
          <div class="add-full">
            <button class="btn-add" onclick="addCustomQuestion()">新增題目 ＋</button>
          </div>
        </div>
      </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="edit-overlay" id="editOverlay">
      <div class="edit-modal">
        <h3 id="editTitle">✏️ 編輯題目</h3>
        <label>景點 / 美食名稱</label>
        <input type="text" id="editItem" maxlength="20" placeholder="名稱">
        <label>所屬縣市</label>
        <select id="editPlace">
          <option value="">選擇縣市</option>
          <option value="taipei-city">台北市</option>
          <option value="new-taipei-city">新北市</option>
          <option value="keelung-city">基隆市</option>
          <option value="taoyuan-city">桃園市</option>
          <option value="hsinchu-city">新竹市</option>
          <option value="hsinchu-county">新竹縣</option>
          <option value="miaoli-county">苗栗縣</option>
          <option value="taichung-city">台中市</option>
          <option value="changhua-county">彰化縣</option>
          <option value="nantou-county">南投縣</option>
          <option value="yunlin-county">雲林縣</option>
          <option value="chiayi-city">嘉義市</option>
          <option value="chiayi-county">嘉義縣</option>
          <option value="tainan-city">台南市</option>

// ═══════════════ MAP PAN/ZOOM ═══════════════
let vx=0, vy=0, vscale=1;
const BASE_VB = {x:0,y:0,w:1000,h:1295};

function applyView(){
  const svg = document.getElementById('twSvg');
  const w = BASE_VB.w / vscale;
  const h = BASE_VB.h / vscale;
  const cx = BASE_VB.x + BASE_VB.w/2 + vx;
  const cy = BASE_VB.y + BASE_VB.h/2 + vy;
  svg.setAttribute('viewBox', `${cx - w/2} ${cy - h/2} ${w} ${h}`);
}

function zoomMap(factor){
  vscale = Math.min(8, Math.max(0.5, vscale * factor));
  applyView();
}

function resetView(){vx=0;vy=0;vscale=1;applyView();}

(function initDrag(){
  const wrap = document.getElementById('mapWrap');
  let dragging=false, startX=0, startY=0, startVx=0, startVy=0;
  wrap.addEventListener('mousedown',e=>{
    dragging=true; startX=e.clientX; startY=e.clientY; startVx=vx; startVy=vy;
    e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const rect = wrap.getBoundingClientRect();
    const px2svgX = BASE_VB.w / vscale / rect.width;
    const px2svgY = BASE_VB.h / vscale / rect.height;
    vx = startVx - (e.clientX - startX) * px2svgX;
    vy = startVy - (e.clientY - startY) * px2svgY;
    applyView();
  });
  window.addEventListener('mouseup',()=>dragging=false);
  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    zoomMap(e.deltaY < 0 ? 1.15 : 0.87);
  },{passive:false});
  // Touch
  let lastDist=0, t1x=0,t1y=0,t2x=0,t2y=0;
  wrap.addEventListener('touchstart',e=>{
    if(e.touches.length===1){
      dragging=true; startX=e.touches[0].clientX; startY=e.touches[0].clientY; startVx=vx; startVy=vy;
    } else if(e.touches.length===2){
      dragging=false;
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      lastDist=Math.hypot(dx,dy);
    }
    e.preventDefault();
  },{passive:false});
  wrap.addEventListener('touchmove',e=>{
    if(e.touches.length===1 && dragging){
      const rect=wrap.getBoundingClientRect();
      const px2svgX=BASE_VB.w/vscale/rect.width;
      const px2svgY=BASE_VB.h/vscale/rect.height;
      vx=startVx-(e.touches[0].clientX-startX)*px2svgX;
      vy=startVy-(e.touches[0].clientY-startY)*px2svgY;
      applyView();
    } else if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.hypot(dx,dy);
      if(lastDist>0) zoomMap(dist/lastDist);
      lastDist=dist;
    }
    e.preventDefault();
  },{passive:false});
  wrap.addEventListener('touchend',()=>{dragging=false;lastDist=0;});
})();

// ═══════════════ BUILD MAP ═══════════════
function buildMap(){
  const svg = document.getElementById('twSvg');
  svg.innerHTML = '';
  REGIONS.forEach(r=>{
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', PATHS[r.id]);
    path.setAttribute('id','r-'+r.id);
    path.setAttribute('class','region');
    path.addEventListener('click',()=>onMapClick(r.id));
    svg.appendChild(path);

    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', r.lx); txt.setAttribute('y', r.ly);
    txt.setAttribute('text-anchor','middle');
    txt.setAttribute('class','map-label');
    txt.setAttribute('id','lbl-'+r.id);
    txt.textContent = r.label;
    svg.appendChild(txt);
  });
  applyView();
}

function setRegion(id, cls){
  const el=document.getElementById('r-'+id);
  const lb=document.getElementById('lbl-'+id);
  if(!el) return;
  el.classList.remove('active','matched','wrong','inactive');
  if(cls) el.classList.add(cls);
  if(lb){ lb.classList.toggle('matched',cls==='matched'); lb.classList.toggle('inactive',cls==='inactive'); }
}

function applyRegionStates(){
  // Reset all
  REGIONS.forEach(r=>setRegion(r.id,''));
  // Mark matched
  G.matched.forEach(item=>{
    const p=G.pairs.find(x=>x.item===item);
    if(p) setRegion(p.place,'matched');
  });
}

// ═══════════════ INTERACTIONS ═══════════════
function onCardClick(item){
  if(G.matched.includes(item)) return;
  G.sel = item;
  renderCards();
  updateCur();
  applyRegionStates();
}

function onMapClick(regionId){
  if(!G.sel){showToast('請先選擇右側的景點或美食！','');return;}
  if(G.matched.includes(G.sel)) return;
  const pair=G.pairs.find(p=>p.item===G.sel);
  if(!pair) return;
  if(pair.place===regionId){
    G.matched.push(G.sel);
    setRegion(regionId,'matched');
    const zh=REGIONS.find(r=>r.id===regionId)?.zh||regionId;
    showToast('✓ 正確！'+G.sel+' 在 '+zh,'ok');
    G.sel=null;
    renderCards(); updateCur(); updateScore();
    if(G.matched.length===G.pairs.length) setTimeout(showResult,600);
  } else {
    G.wrong++;
    setRegion(regionId,'wrong');
    setTimeout(()=>{ setRegion(regionId,''); applyRegionStates(); },600);
    flashCard(G.sel);
    showToast('✗ 不對喔，再試試！','ng');
    updateScore();
  }
}

// ═══════════════ RENDER ═══════════════
function renderCards(){
  const grid=document.getElementById('cardGrid');
  grid.innerHTML=G.pairs.map(p=>{
    const isSel=G.sel===p.item;
    const isDone=G.matched.includes(p.item);
    const region=REGIONS.find(r=>r.id===p.place);
    const EMOJI_MAP={'台北市':'🏙️','新北市':'🏮','基隆市':'⚓','桃園市':'✈️','新竹市':'💨','新竹縣':'🍵','苗栗縣':'🏔️','台中市':'🌈','彰化縣':'🛕','南投縣':'🌊','雲林縣':'🎭','嘉義市':'🍗','嘉義縣':'🚂','台南市':'🥭','高雄市':'🐉','屏東縣':'🐠','宜蘭縣':'🦆','花蓮縣':'⛰️','台東縣':'🍱','金門縣':'🦁','澎湖縣':'🌺','連江縣':'✨'};
    const emoji = EMOJI_MAP[REGIONS.find(r=>r.id===p.place)?.zh]||'📍';
    return `<div class="card${isSel?' sel':''}${isDone?' matched':''}" id="card-${CSS.escape(p.item)}" onclick="onCardClick('${p.item.replace(/'/g,"\\'")}')">
      <img src="${p.img}" alt="${p.item}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="img-fallback" style="display:none">${emoji}<span>${p.item}</span></div>
      <div class="card-name">${p.item}</div>
      ${isDone?`<div class="match-tag">✓ ${region?.zh||''}</div>`:''}
      ${isSel&&!isDone?'<div class="sel-badge">選中</div>':''}
    </div>`;
  }).join('');
}

function updateCur(){
  const box=document.getElementById('curBox');
  if(!G.sel){box.className='cur-box';box.innerHTML='<div class="cur-empty">👉 請先選擇右側的景點或美食</div>';return;}
  const pair=G.pairs.find(p=>p.item===G.sel);
  if(!pair) return;
  box.className='cur-box has';
  const EMOJI_MAP2={'台北市':'🏙️','新北市':'🏮','基隆市':'⚓','桃園市':'✈️','新竹市':'💨','新竹縣':'🍵','苗栗縣':'🏔️','台中市':'🌈','彰化縣':'🛕','南投縣':'🌊','雲林縣':'🎭','嘉義市':'🍗','嘉義縣':'🚂','台南市':'🥭','高雄市':'🐉','屏東縣':'🐠','宜蘭縣':'🦆','花蓮縣':'⛰️','台東縣':'🍱','金門縣':'🦁','澎湖縣':'🌺','連江縣':'✨'};

  box.innerHTML=`<img class="cur-img" src="${pair.img}" alt="${pair.item}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="cur-fallback" style="display:none;font-size:42px">${e2}</div>
    <div class="cur-name">${pair.item}</div><div class="cur-hint">⬇ 點地圖上的縣市配對</div>`;
}

function updateScore(){
  document.getElementById('sM').textContent=G.matched.length;
  document.getElementById('sT').textContent=G.pairs.length;
  document.getElementById('sW').textContent=G.wrong;
  const pct=G.pairs.length?Math.round(G.matched.length/G.pairs.length*100):0;
  document.getElementById('prog').style.width=pct+'%';
}

function flashCard(item){
  const el=document.getElementById('card-'+CSS.escape(item));
  if(!el) return;
  el.classList.add('wrong');
  setTimeout(()=>el.classList.remove('wrong'),500);
}

// ═══════════════ QUESTION MANAGER ═══════════════
// builtinPairs is a mutable copy; deletions/edits apply here
let builtinPairs = BUILTIN_PAIRS.map(p=>({...p, _builtin:true}));
let customPairs = [];
let qTab = 'builtin'; // 'builtin' | 'custom'
let pendingImgSrc = '';
// Edit state
let editTarget = null; // {src:'builtin'|'custom', idx:Number}
let editImgSrc = '';

function switchTab(tab){
  qTab = tab;
  document.getElementById('tab-builtin').classList.toggle('on', tab==='builtin');
  document.getElementById('tab-custom').classList.toggle('on', tab==='custom');
  document.getElementById('addToggleBtn').style.display = tab==='custom' ? '' : 'none';
  document.getElementById('addFormWrap').classList.remove('open');
  document.getElementById('qSearch').value = '';
  renderQList();
}

function renderQList(){
  const search = document.getElementById('qSearch').value.trim().toLowerCase();
  const list = document.getElementById('qList');
  const pairs = qTab==='builtin' ? builtinPairs : customPairs;
  const filtered = search ? pairs.filter(p=>p.item.toLowerCase().includes(search)) : pairs;
  if(!filtered.length){
    list.innerHTML='<div class="q-empty">'+(search?'沒有符合的題目':'暫無題目，請新增！')+'</div>';
    return;
  }
  list.innerHTML = filtered.map((p,fi)=>{
    const realIdx = pairs.indexOf(p);
    const region = REGIONS.find(r=>r.id===p.place);
    const delBtn = qTab==='builtin'
      ? `<button class="qi-btn del" onclick="deleteBuiltin(${realIdx})" title="刪除">🗑</button>`
      : `<button class="qi-btn del" onclick="deleteCustom(${realIdx})" title="刪除">🗑</button>`;
    return `<div class="q-item">
      <img src="${p.img}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" style="width:44px;height:34px;object-fit:cover;border-radius:5px;flex-shrink:0;background:#e0e0e0">
      <div style="width:44px;height:34px;border-radius:5px;flex-shrink:0;background:linear-gradient(135deg,#f5e6d3,#ffe0b2);display:none;align-items:center;justify-content:center;font-size:18px">🖼️</div>
      <div class="qi-info">
        <div class="qi-name">${p.item}</div>
        <div class="qi-place">${region?.zh||p.place}</div>
      </div>
      <div class="qi-btns">
        <button class="qi-btn edit" onclick="openEdit('${qTab}',${realIdx})">✏️ 編輯</button>
        ${delBtn}
      </div>
    </div>`;
  }).join('');
}

function toggleAddForm(){
  const wrap = document.getElementById('addFormWrap');
  const isOpen = wrap.classList.toggle('open');
  document.getElementById('addToggleBtn').textContent = isOpen ? '✕ 關閉' : '➕ 新增自訂題目';
}

// ── Add new custom ──
function handleImgFile(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{pendingImgSrc=e.target.result;_showAddPreview(pendingImgSrc);document.getElementById('addImgUrl').value='';};

  const p=document.getElementById('imgPreview');p.src=src;p.style.display='block';

function addCustomQuestion(){
  const item=document.getElementById('addItem').value.trim();
  const place=document.getElementById('addPlace').value;
  if(!item){showToast('請輸入名稱','ng');return;}
  if(!place){showToast('請選擇縣市','ng');return;}
  const allItems=[...builtinPairs,...customPairs].map(p=>p.item);
  if(allItems.includes(item)){showToast('此題目已存在','ng');return;}

  customPairs.push({item,place,img});
  document.getElementById('addItem').value='';
  document.getElementById('addPlace').value='';
  document.getElementById('addImgUrl').value='';
  document.getElementById('addImgFile').value='';
  document.getElementById('imgPreview').style.display='none';
  document.getElementById('imgUploadLabel').textContent='📷 上傳圖片';
  pendingImgSrc='';
  showToast('✓ 題目新增成功！','ok');
  renderQList();
}
function deleteBuiltin(idx){
  if(!confirm('確定要刪除「'+builtinPairs[idx].item+'」嗎？')) return;
  builtinPairs.splice(idx,1); renderQList(); showToast('已刪除題目','ok');
}
function deleteCustom(idx){
  if(!confirm('確定要刪除「'+customPairs[idx].item+'」嗎？')) return;
  customPairs.splice(idx,1); renderQList(); showToast('已刪除題目','ok');
}

// ── Edit ──
function openEdit(src, idx){
  const arr = src==='builtin' ? builtinPairs : customPairs;
  const p = arr[idx];
  editTarget={src,idx};
  editImgSrc = p.img;
  document.getElementById('editTitle').textContent = src==='builtin' ? '✏️ 編輯預設題目' : '✏️ 編輯自訂題目';
  document.getElementById('editItem').value = p.item;
  document.getElementById('editPlace').value = p.place;
  document.getElementById('editThumb').src = p.img;
  document.getElementById('editImgUrl').value = '';
  document.getElementById('editImgFile').value = '';
  document.getElementById('editOverlay').classList.add('open');
}
function closeEdit(){
  document.getElementById('editOverlay').classList.remove('open');
  editTarget=null; editImgSrc='';
}
function handleEditImgFile(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    editImgSrc=e.target.result;
    document.getElementById('editThumb').src=editImgSrc;
    document.getElementById('editImgUrl').value='';
  };
  reader.readAsDataURL(file);
}
function handleEditImgUrl(input){
  editImgSrc=input.value.trim();
  if(editImgSrc) document.getElementById('editThumb').src=editImgSrc;
}
function saveEdit(){
  const item=document.getElementById('editItem').value.trim();
  const place=document.getElementById('editPlace').value;
  if(!item){showToast('請輸入名稱','ng');return;}
  if(!place){showToast('請選擇縣市','ng');return;}
  const arr=editTarget.src==='builtin' ? builtinPairs : customPairs;
  const old=arr[editTarget.idx];
  // Check duplicate (allow same name)
  const dup=[...builtinPairs,...customPairs].find((p,i)=>p.item===item && !(editTarget.src==='builtin'&&builtinPairs.indexOf(p)===editTarget.idx) && !(editTarget.src==='custom'&&customPairs.indexOf(p)===editTarget.idx));
  if(dup){showToast('名稱與其他題目重複','ng');return;}
  arr[editTarget.idx]={...old, item, place, img:editImgSrc||old.img};
  closeEdit();
  renderQList();
  showToast('✓ 已儲存修改','ok');
}

// ═══════════════ TOAST ═══════════════
let toastT;
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(type?' '+type:'');
  clearTimeout(toastT); toastT=setTimeout(()=>t.className='toast',2200);
}

// ═══════════════ GAME LOGIC ═══════════════
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function pickPairs(n){
  const allPairs = [...builtinPairs, ...customPairs];
  // One item per region
  const byRegion={};
  allPairs.forEach(p=>{
    if(!byRegion[p.place]) byRegion[p.place]=[];
    byRegion[p.place].push(p);
  });
  const regions=shuffle(Object.keys(byRegion));
  const out=[];
  for(const r of regions){
    if(out.length>=n) break;
    const opts=byRegion[r];
    out.push(opts[Math.floor(Math.random()*opts.length)]);
  }
  return shuffle(out);
}

function startGame(count){
  count = Math.max(1, Math.min(count||6, [...builtinPairs,...customPairs].length || 22));
  G={count, pairs:pickPairs(count), matched:[], wrong:0, sel:null};
  document.getElementById('resModal').style.display='none';
  document.getElementById('rtitle').textContent=`共 ${G.pairs.length} 題`;
  buildMap();
  renderCards(); updateCur(); updateScore();
}
function startCustomCount(){
  const v = parseInt(document.getElementById('countInput').value)||6;
  startGame(v);
}

function showResult(){
  const s=G.wrong===0?'🌟🌟🌟':G.wrong<=2?'⭐⭐':'⭐';
  const m=G.wrong===0?'太棒了！你是台灣通！':G.wrong<=3?'答得不錯！繼續加油！':'別灰心，再玩一次！';
  document.getElementById('resStars').textContent=s;
  document.getElementById('resMsg').textContent=m;
  document.getElementById('resSub').textContent=`完成 ${G.pairs.length} 題，共答錯 ${G.wrong} 次`;
  document.getElementById('resModal').style.display='flex';
}
